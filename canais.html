<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade de Canais | RKM PLAY</title>
    <style>
        :root { --bg-color: #060606; --card-bg: #111111; --border-color: #222222; --orange: #FF6600; --green: #25D366; --text-main: #FFFFFF; --text-muted: #999999; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.5; padding-bottom: 80px; }
        a { text-decoration: none; color: inherit; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--border-color); }
        .logo-img { height: 40px; }
        
        /* Menu Lateral */
        .side-menu { position: fixed; top: 0; right: 0; width: 100%; height: 100vh; background-color: var(--bg-color); z-index: 9999; transform: translateX(100%); transition: transform 0.3s; padding: 20px; overflow-y: auto; }
        .side-menu.active { transform: translateX(0); }
        
        /* Filtros Originais */
        .filters-wrapper { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; padding: 20px; }
        .filter-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px 15px; border-radius: 20px; font-size: 13px; cursor: pointer; }
        .filter-btn.active { background: var(--orange); border-color: var(--orange); }

        /* Canais */
        .channels-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 10px; }
        .channel-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 15px; border-radius: 10px; text-align: center; }
        .channel-name { font-size: 12px; color: #fff; margin-top: 10px; font-weight: bold; }
        
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: var(--green); color: #fff; padding: 15px; border-radius: 50%; z-index: 1000; }
    </style>
</head>
<body>

    <header>
        <a href="index.html"><img src="https://i.postimg.cc/NMx2hW3d/RKMPLAY.png" alt="RKM PLAY" class="logo-img"></a>
        <div class="menu-icon" id="open-menu" style="font-size:24px;">☰</div>
    </header>

    <div class="side-menu" id="side-menu">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <img src="https://i.postimg.cc/NMx2hW3d/RKMPLAY.png" alt="RKM PLAY" style="height: 30px;">
            <div class="close-menu" id="close-menu" style="font-size:24px;">✕</div>
        </div>
        <ul>
            <li><a href="index.html" style="display:block; padding:15px; font-weight:bold;">Início</a></li>
            <li><a href="canais.html" style="display:block; padding:15px; font-weight:bold; color:var(--orange);">Canais</a></li>
            <li><a href="#" style="display:block; padding:15px; font-weight:bold;">Esportes</a></li>
            <li><a href="#" style="display:block; padding:15px; font-weight:bold;">Planos</a></li>
            <li><a href="#" style="display:block; padding:15px; font-weight:bold;">Ajuda</a></li>
        </ul>
    </div>

    <div class="filters-wrapper">
        <button class="filter-btn active">Todos</button>
        <button class="filter-btn">Esportes</button>
        <button class="filter-btn">Filmes e Séries</button>
        <button class="filter-btn">Abertos</button>
        <button class="filter-btn">On Demand</button>
        <button class="filter-btn">Notícias</button>
        <button class="filter-btn">Infantil</button>
        <button class="filter-btn">Documentários</button>
        <button class="filter-btn">Variedades</button>
        <button class="filter-btn">Música</button>
        <button class="filter-btn">Cultura</button>
        <button class="filter-btn">Agro</button>
        <button class="filter-btn">Internacionais</button>
        <button class="filter-btn">Religioso</button>
        <button class="filter-btn">Adulto (+18)</button>
    </div>

    <div class="channels-grid">
        <div class="channel-card"><div style="font-weight:900;">sportv3</div><div class="channel-name">SportV 3</div></div>
        <div class="channel-card"><div style="color:var(--green); font-weight:900;">PREMIERE</div><div class="channel-name">Premiere 2</div></div>
    </div>

    <a href="https://wa.me/5511984334348" class="whatsapp-float">💬</a>

    <script>
        document.getElementById('open-menu').onclick = () => document.getElementById('side-menu').classList.add('active');
        document.getElementById('close-menu').onclick = () => document.getElementById('side-menu').classList.remove('active');
    </script>
</body>
</html>
